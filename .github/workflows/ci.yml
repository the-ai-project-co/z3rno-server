name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: z3rno
          POSTGRES_PASSWORD: z3rno_dev_password
          POSTGRES_DB: z3rno
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U z3rno -d z3rno"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://z3rno:z3rno_dev_password@localhost:5432/z3rno
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: mypy — type check
        run: uv run mypy .

      - name: pytest — unit tests
        run: uv run pytest -v --cov --cov-report=term-missing --cov-report=xml
