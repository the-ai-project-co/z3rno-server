name: Build & Publish z3rno-server image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/docker-entrypoint.sh'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/server-image.yml'
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'scripts/docker-entrypoint.sh'
      - '.github/workflows/server-image.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: the-ai-project-co/z3rno-server

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag policy mirrors the postgres image:
          #   - `latest` on every main commit
          #   - `vX.Y.Z` on every release tag
          #   - `main-<sha>` for every main commit (for pinning)
          #   - `pr-<n>` for pull requests (push step skipped — build-only smoke)
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,prefix=main-,suffix=-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=z3rno-server
            org.opencontainers.image.description=FastAPI server for Z3rno — store / recall / forget / audit / ingest / distill / refine over PostgreSQL + pgvector + Apache AGE.
            org.opencontainers.image.source=https://github.com/the-ai-project-co/z3rno-server
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push (org namespace)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # v0.19.10 — multi-arch. amd64 covers most prod clusters;
          # arm64 covers Apple Silicon kind/Docker Desktop smoke runs +
          # Graviton / Ampere Altra cloud nodes. python:3.12-slim is
          # already multi-arch; the only build-time cost is ~2 min of
          # QEMU cross-build per push, which is worth not gating local
          # validation behind Rosetta.
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # v0.21.3 — public mirror. The org-namespace image
      # ``ghcr.io/the-ai-project-co/z3rno-server`` is private (no API
      # endpoint to flip visibility — UI-only, blocked in our org
      # admin flow). External users hit 401 trying to pull it.
      # ``ghcr.io/safayavatsal/z3rno-server`` is public but unowned
      # by this CI — needs a PAT secret (``MIRROR_GHCR_PAT``,
      # generated under the safayavatsal account with write:packages
      # scope) to push.
      #
      # When the secret is absent the steps skip cleanly; the org
      # push above still runs. As soon as the secret is set, every
      # subsequent main commit + tag mirrors automatically.
      - name: Log in to mirror namespace
        if: github.event_name != 'pull_request' && env.MIRROR_PAT != ''
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_GHCR_PAT }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: safayavatsal
          password: ${{ secrets.MIRROR_GHCR_PAT }}

      - name: Mirror metadata (safayavatsal namespace)
        id: mirror_meta
        if: github.event_name != 'pull_request' && env.MIRROR_PAT != ''
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_GHCR_PAT }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/safayavatsal/z3rno-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push (public mirror)
        if: github.event_name != 'pull_request' && env.MIRROR_PAT != ''
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_GHCR_PAT }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.mirror_meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
