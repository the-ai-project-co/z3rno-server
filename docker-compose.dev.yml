# z3rno-server — local development stack
#
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.dev.yml up
#
# What this gives you:
#   - PostgreSQL 17 with pgvector, pgvectorscale, Apache AGE, pg_cron, pgaudit
#     pre-installed (ghcr.io/the-ai-project-co/z3rno-postgres:17)
#   - Valkey 8 for cache, session state, rate limiting, Celery broker
#   - z3rno-server (FastAPI) bound to localhost:8000
#   - z3rno-worker (Celery) consuming the same broker
#
# All four services live on a dedicated Docker network so they can reach each
# other by service name (e.g. postgres://valkey:6379) without exposing extra
# ports to the host.

name: z3rno-dev

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 17 + every extension Z3rno needs (pre-built image)
  # --------------------------------------------------------------------------
  postgres:
    image: ghcr.io/the-ai-project-co/z3rno-postgres:17
    # The base image is built linux/amd64-only because pgvectorscale doesn't
    # publish arm64 binaries in its release zips yet. On Apple Silicon, Docker
    # pulls and runs the amd64 variant via Rosetta emulation transparently.
    # When pgvectorscale ships arm64 (or we add a build-from-source fallback
    # to the postgres-image.yml workflow), this can be removed.
    platform: linux/amd64
    container_name: z3rno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-z3rno}
      POSTGRES_USER: ${POSTGRES_USER:-z3rno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-z3rno_dev_password}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-z3rno} -d ${POSTGRES_DB:-z3rno}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - z3rno

  # --------------------------------------------------------------------------
  # Valkey 8 — cache, session state, rate-limit counters, Celery broker
  # --------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:8
    container_name: z3rno-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - z3rno

  # --------------------------------------------------------------------------
  # z3rno-server (FastAPI)
  #
  # NOTE: the Dockerfile is a placeholder until Week 3 ships the real server
  # scaffold. For now the `server` service builds an empty image with uvicorn
  # installed and exits cleanly if no src/z3rno_server/main.py exists yet.
  # --------------------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z3rno-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-z3rno}:${POSTGRES_PASSWORD:-z3rno_dev_password}@postgres:5432/${POSTGRES_DB:-z3rno}
      VALKEY_URL: redis://valkey:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      Z3RNO_API_KEY: ${Z3RNO_API_KEY:-z3rno_sk_test_localdev}
      Z3RNO_DEV_ORG_ID: ${Z3RNO_DEV_ORG_ID:-aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "${SERVER_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - z3rno

  # --------------------------------------------------------------------------
  # Celery worker — shares the server image, runs the celery workers command
  # instead of uvicorn. Consumes tasks from valkey, reads/writes postgres.
  # --------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z3rno-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-z3rno}:${POSTGRES_PASSWORD:-z3rno_dev_password}@postgres:5432/${POSTGRES_DB:-z3rno}
      VALKEY_URL: redis://valkey:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      # Forge surfaces — operators opt these on at the worker tier the
      # same way they do at the server tier. Off by default so the
      # vanilla dev stack stays byte-identical to pre-Phase-A.
      DISTILL_ENABLED: ${DISTILL_ENABLED:-false}
      INGEST_ENABLED: ${INGEST_ENABLED:-false}
      REFINE_ENABLED: ${REFINE_ENABLED:-false}
    # v0.21.3 — replace the pre-fix ``tail -f /dev/null`` placeholder
    # with a real Celery worker. The Dockerfile entrypoint always
    # exec's uvicorn, so we override entrypoint to bypass it. Closes
    # Finding #11 (part 1) from V0-21-2-AS-A-USER-2026-05-12.
    entrypoint: []
    command:
      - "celery"
      - "-A"
      - "z3rno_server.workers.celery_app"
      - "worker"
      - "--loglevel=info"
      - "--concurrency=${CELERY_WORKER_CONCURRENCY:-4}"
    networks:
      - z3rno

  # --------------------------------------------------------------------------
  # Celery beat scheduler. Singleton — do NOT scale beyond 1 replica.
  # Required for periodic z3rno.audit_drain (1 s cadence by default) so
  # audit_log_pending stays bounded and GET /v1/audit returns rows. Also
  # drives z3rno.sweep_expired_memories, decay_importance, etc.
  #
  # v0.21.3 — added in response to Finding #11 from
  # V0-21-2-AS-A-USER-2026-05-12: pre-fix the dev compose shipped server
  # + worker only, so the drain never fired and operators trying the
  # Quickstart saw an empty audit log.
  # --------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z3rno-beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-z3rno}:${POSTGRES_PASSWORD:-z3rno_dev_password}@postgres:5432/${POSTGRES_DB:-z3rno}
      VALKEY_URL: redis://valkey:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DISTILL_ENABLED: ${DISTILL_ENABLED:-false}
      INGEST_ENABLED: ${INGEST_ENABLED:-false}
      REFINE_ENABLED: ${REFINE_ENABLED:-false}
      # v0.22.2 — listener handles the hot path; this is the safety
      # fallback only. Long interval keeps the beat from contending
      # with in-flight recall audit writes (the v0.22 bench's tail
      # outlier source).
      AUDIT_DRAIN_INTERVAL_SECONDS: ${AUDIT_DRAIN_INTERVAL_SECONDS:-60}
    entrypoint: []
    command:
      - "celery"
      - "-A"
      - "z3rno_server.workers.celery_app"
      - "beat"
      - "--loglevel=info"
      # v0.21.3 — pin the schedule DB to /tmp. The container runs as
      # the non-root z3rno user; default celerybeat tries to create
      # ``celerybeat-schedule`` in CWD (/app), which fails with
      # EACCES and the container crashloops. Closes Finding #12 from
      # V0-21-2-AS-A-USER-2026-05-12.
      - "-s"
      - "/tmp/celerybeat-schedule"
    networks:
      - z3rno

  # --------------------------------------------------------------------------
  # v0.22.2 — audit listener. Singleton — do NOT scale beyond 1 replica.
  # Opens a Postgres LISTEN on z3rno_audit_pending (Migration 032 trigger)
  # and fires z3rno.audit_drain on every NOTIFY — drain wakes in ~50 ms
  # instead of waiting for the next beat tick. The beat-driven drain stays
  # in place as a 60 s fallback (see AUDIT_DRAIN_INTERVAL_SECONDS below)
  # so a stuck listener can't grow the queue unbounded.
  #
  # Why this matters: with the listener off + 1 s beat cadence (the
  # pre-v0.22.2 default), high-concurrency recall benches show periodic
  # ~60 s tail outliers — the beat tick acquires per-org advisory locks
  # while a recall's audit-write transaction is mid-flight, blocking the
  # recall for one full drain cycle. The v0.22.0 batched-recall bench
  # confirmed this is independent of recall counter pressure. Tracked in
  # OPEN-WORK.md → "Audit-drain tail outlier remediation".
  # --------------------------------------------------------------------------
  audit-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z3rno-audit-listener
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-z3rno}:${POSTGRES_PASSWORD:-z3rno_dev_password}@postgres:5432/${POSTGRES_DB:-z3rno}
      VALKEY_URL: redis://valkey:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      Z3RNO_AUDIT_LISTEN_ENABLED: "true"
    entrypoint: []
    command: ["z3rno-audit-listener"]
    networks:
      - z3rno

# -----------------------------------------------------------------------------
# Named volumes — survive `docker compose down` and container restarts.
# Removed only by `docker compose down -v` or explicit `docker volume rm`.
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
    name: z3rno_postgres_data
  valkey_data:
    driver: local
    name: z3rno_valkey_data

# -----------------------------------------------------------------------------
# Dedicated network — services reach each other by service name:
#   - postgres      (DNS → postgres container)
#   - valkey        (DNS → valkey container)
#   - server        (DNS → server container)
#   - worker        (DNS → worker container)
#   - beat          (DNS → beat container; singleton)
# -----------------------------------------------------------------------------
networks:
  z3rno:
    driver: bridge
    name: z3rno_dev_network
